
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Constellation ✨</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#020617;
overflow-x:hidden;
color:white;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at center,#00000000,#000814);
z-index:-1;
}

.hero{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:30px;

}

h1{

font-size:55px;
letter-spacing:3px;

animation:fade 2s ease;

}

.subtitle{

margin-top:20px;

font-size:22px;

opacity:.85;

animation:fade 4s ease;

}

button{

margin-top:45px;

padding:18px 45px;

border:none;

border-radius:50px;

font-size:20px;

background:white;

cursor:pointer;

transition:.4s;

}

button:hover{

transform:scale(1.08);

}

@keyframes fade{

from{

opacity:0;

transform:translateY(40px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>

<body>

<canvas id="stars"></canvas>

<div class="overlay"></div>

<section class="hero">

<h1>✨ Our Constellation ✨</h1>

<p class="subtitle">

Every star has a story...

Ours became a universe.

</p>

<button>

Begin Our Journey ❤️

</button>

</section>

<script>

const canvas=document.getElementById("stars");

const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<250;i++){

stars.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

r:Math.random()*2,

d:Math.random()

})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(s=>{

ctx.beginPath();

ctx.arc(s.x,s.y,s.r,0,Math.PI*2);

ctx.fill();

s.y+=0.2*s.d;

if(s.y>canvas.height){

s.y=0;

s.x=Math.random()*canvas.width;

}

})

requestAnimationFrame(draw);

}

draw();

</script>

</body>

</html>
